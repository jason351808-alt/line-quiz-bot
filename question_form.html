{% extends 'base.html' %}
{% block title %}{% if mode == 'add' %}新增題目{% else %}修改題目{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-3">{% if mode == 'add' %}新增題目{% else %}修改題目{% endif %}</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">分類</label>
            <input type="text" name="category" class="form-control" value="{{ question.category if question else '' }}">
          </div>
          <div class="mb-3">
            <label class="form-label">題目</label>
            <textarea name="question" class="form-control" rows="3" required>{{ question.question if question else '' }}</textarea>
          </div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">選項 A</label>
              <input type="text" name="option_a" class="form-control" value="{{ question.option_a if question else '' }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">選項 B</label>
              <input type="text" name="option_b" class="form-control" value="{{ question.option_b if question else '' }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">選項 C</label>
              <input type="text" name="option_c" class="form-control" value="{{ question.option_c if question else '' }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">選項 D</label>
              <input type="text" name="option_d" class="form-control" value="{{ question.option_d if question else '' }}" required>
            </div>
          </div>
          <div class="mt-3 mb-4">
            <label class="form-label">正確答案</label>
            <select name="answer" class="form-select" required>
              {% for x in ['A','B','C','D'] %}
                <option value="{{ x }}" {% if question and question.answer == x %}selected{% endif %}>{{ x }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary">{% if mode == 'add' %}新增{% else %}更新{% endif %}</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">返回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
