<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台登入</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5"><div class="row justify-content-center"><div class="col-md-5">
<div class="card shadow-sm"><div class="card-body p-4">
<h3 class="mb-4 text-center">題庫後台登入</h3>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post">
<div class="mb-3"><label class="form-label">帳號</label><input type="text" name="username" class="form-control" required></div>
<div class="mb-3"><label class="form-label">密碼</label><input type="password" name="password" class="form-control" required></div>
<button type="submit" class="btn btn-primary w-100">登入</button>
</form>
</div></div></div></div></div>
</body></html>
