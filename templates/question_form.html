<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if mode == 'edit' %}修改題目{% else %}新增題目{% endif %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script>
function updateTypeHint() {
    const type = document.getElementById("type").value;
    const hint = document.getElementById("answer-hint");
    const tf = document.getElementById("tf-note");
    if (type === "single") {
        hint.innerText = "單選題答案請填 A~H 或 1~8";
        tf.style.display = "none";
    } else if (type === "multi") {
        hint.innerText = "多選題答案請填例如 AB / 12 / BDF / 246";
        tf.style.display = "none";
    } else {
        hint.innerText = "是非題答案請填 A 或 B（A=是，B=否）";
        tf.style.display = "block";
    }
}
window.onload = updateTypeHint;
</script>
</head>
<body class="bg-light">
<div class="container py-4">
<div class="d-flex justify-content-between align-items-center mb-4">
<h2>{% if mode == 'edit' %}修改題目{% else %}新增題目{% endif %}</h2>
<a href="/dashboard" class="btn btn-outline-secondary">回列表</a>
</div>
<div class="card shadow-sm"><div class="card-body">
<form method="post">
<div class="mb-3"><label class="form-label">分類</label><input type="text" name="category" class="form-control" value="{{ q.category if q else '' }}"></div>
<div class="mb-3"><label class="form-label">題型</label>
<select name="type" id="type" class="form-select" onchange="updateTypeHint()" required>
<option value="single" {% if q and q.type == 'single' %}selected{% endif %}>單選題</option>
<option value="multi" {% if q and q.type == 'multi' %}selected{% endif %}>多選題</option>
<option value="tf" {% if q and q.type == 'tf' %}selected{% endif %}>是非題</option>
</select></div>
<div class="mb-3"><label class="form-label">題目</label><textarea name="question" class="form-control" rows="3" required>{{ q.question if q else '' }}</textarea></div>
<div class="row">
<div class="col-md-6 mb-3"><label class="form-label">選項 A</label><input type="text" name="option_a" class="form-control" value="{{ q.option_a if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 B</label><input type="text" name="option_b" class="form-control" value="{{ q.option_b if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 C</label><input type="text" name="option_c" class="form-control" value="{{ q.option_c if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 D</label><input type="text" name="option_d" class="form-control" value="{{ q.option_d if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 E</label><input type="text" name="option_e" class="form-control" value="{{ q.option_e if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 F</label><input type="text" name="option_f" class="form-control" value="{{ q.option_f if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 G</label><input type="text" name="option_g" class="form-control" value="{{ q.option_g if q else '' }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">選項 H</label><input type="text" name="option_h" class="form-control" value="{{ q.option_h if q else '' }}"></div>
</div>
<div class="mb-3">
<label class="form-label">答案</label>
<input type="text" name="answer" class="form-control" value="{{ q.answer if q else '' }}" required>
<div class="form-text" id="answer-hint"></div>
<div class="form-text text-primary" id="tf-note" style="display:none;">是非題建議：A = 是，B = 否</div>
</div>
<button type="submit" class="btn btn-primary">{% if mode == 'edit' %}更新題目{% else %}新增題目{% endif %}</button>
</form>
</div></div></div>
</body></html>
